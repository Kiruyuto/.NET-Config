name: "Release Please"

on:
  push:
    branches: ["master"]

concurrency:
  group: "${{ github.workflow }}"
  cancel-in-progress: false

permissions: {}

jobs:
  release-please:
    name: "Release-Please"
    runs-on: ["ubuntu-latest"]
    outputs:
      releases_created: ${{ steps.run-release-please.outputs.releases_created }}
      tag_name: ${{ steps.run-release-please.outputs.tag_name }}
      version: ${{ steps.run-release-please.outputs.version }}
    steps:
      - name: "Generate App Token"
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: generate-token
        with:
          client-id: ${{ secrets.DEV_APP_CLIENT_ID }}
          private-key: ${{ secrets.DEV_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: "Run release-please"
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: run-release-please
        with:
          token: ${{ steps.generate-token.outputs.token }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

      - name: "Echo json"
        run: echo "$OUTPUTS"
        shell: bash
        env:
          OUTPUTS: ${{ toJSON(steps.run-release-please.outputs) }}

  release-dotnet-config:
    name: "Release: DotNet.Config"
    runs-on: ["ubuntu-latest"]
    needs: "release-please"
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    timeout-minutes: 20
    env:
      PackageName: "Kiruyuto.DotNet.Config.${{ needs.release-please.outputs.version }}.nupkg"
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Setup .NET"
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: "global.json"

      - name: "Pack"
        run: dotnet pack Kiruyuto.DotNet.Config/Kiruyuto.DotNet.Config.csproj -c Release -o outputFiles -p:PackageVersion=${{ needs.release-please.outputs.version }}

      - name: NuGet login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: "Push to NuGet"
        run: dotnet nuget push ./outputFiles/${{ env.PackageName }} --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{ steps.login.outputs.NUGET_API_KEY }}

      - name: "Add GitHub Packages source and push"
        run: |
          dotnet nuget add source --username ${{ github.actor || github.repository_owner }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name GitHub "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget push ./outputFiles/${{ env.PackageName }} --source 'GitHub' --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
