name: "Release Please"

on:
  push:
    branches: ["master"]

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  release-please:
    name: "Release-Please"
    runs-on: ["ubuntu-latest"]
    outputs:
      releases_created: ${{ steps.run-release-please.outputs.releases_created }}
      tag_name: ${{ steps.run-release-please.outputs.tag_name }}
      version: ${{ steps.run-release-please.outputs.version }}
    steps:
      - name: "Generate App Token"
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: generate-token
        with:
          app-id: ${{ secrets.DEV_APP_ID }}
          private-key: ${{ secrets.DEV_APP_PRIVATE_KEY }}

      - name: "Run release-please"
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: run-release-please
        with:
          token: ${{ steps.generate-token.outputs.token }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

      - name: "Echo json"
        run: echo "$OUTPUTS"
        shell: bash
        env:
          OUTPUTS: ${{ toJSON(steps.run-release-please.outputs) }}

  release-dotnet-config:
    name: "Release: DotNet.Config"
    runs-on: ["ubuntu-latest"]
    needs: "release-please"
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    timeout-minutes: 20
    env:
      PackageName: "Kiruyuto.DotNet.Config.${{ needs.release-please.outputs.version }}.nupkg"
    permissions: write-all
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Setup .NET"
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: "global.json"

      - name: "Pack"
        run: dotnet pack Kiruyuto.DotNet.Config/Kiruyuto.DotNet.Config.csproj -c Release -o outputFiles -p:PackageVersion=${{ needs.release-please.outputs.version }}

      - name: NuGet login
        uses: NuGet/login@d22cc5f58ff5b88bf9bd452535b4335137e24544 # v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: "Push to NuGet"
        run: dotnet nuget push ./outputFiles/${{ env.PackageName }} --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{ steps.login.outputs.NUGET_API_KEY }}

      - name: "Add GitHub Packages source and push"
        run: |
          dotnet nuget add source --username ${{ github.actor || github.repository_owner }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name GitHub "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget push ./outputFiles/${{ env.PackageName }} --source 'GitHub' --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
