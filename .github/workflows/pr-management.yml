name: "PR Management"

on:
  # Safe to use pull_request_target here because this workflow only reads PR metadata and writes comments/labels.
  # Do not checkout or execute PR code.
  pull_request_target:
    types: ["opened", "edited", "synchronize", "ready_for_review", "reopened"]
    branches: ["master"]

concurrency:
  group: "${{ github.head_ref || github.ref }}-${{ github.workflow }}"
  cancel-in-progress: true

permissions: {}

jobs:
  validate-pr-title:
    name: "Validate & Label PR"
    runs-on: ["ubuntu-latest"]
    timeout-minutes: 5
    steps:
      - name: "Generate App Token"
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: generate-token
        with:
          app-id: ${{ secrets.DEV_APP_CLIENT_ID }}
          private-key: ${{ secrets.DEV_APP_PRIVATE_KEY }}
          permission-pull-requests: write
          permission-issues: write
      - name: "Check PR Title"
        id: lint_pr_title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        with:
          wip: true
          types: |
            feat
            fix
            ci
            chore
            docs
            test
            style
            refactor
            perf
          requireScope: false
          subjectPattern: ^([A-Z]).+$
          subjectPatternError: |
            The subject
            "{subject}"
            found in the pull request title
            "{title}"
            didn't match the configured pattern. Please ensure that the subject starts with an uppercase character.
            Example:
            feat(ui): Add `Button` component
            ^    ^    ^
            |    |    |__ Subject
            |    |_______ Scope
            |____________ Type
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
      - name: "Add PR comment"
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        if: always() && (steps.lint_pr_title.outputs.error_message != null)
        with:
          header: "pr-title-lint-error"
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          message: |
            Ayo, @${{ github.actor }}! 🚨

            Your pull request title does not follow [Conventional Commits specification](https://www.conventionalcommits.org/en/v1.0.0/) and it looks like your title should be adjusted.
            You can check configuration [here](https://github.com/${{ github.repository }}/blob/${{ github.event.repository.default_branch }}/.github/workflows/pr-management.yml).

            Details:
            ${{ steps.lint_pr_title.outputs.error_message }}
      - name: "Remove PR comment"
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        if: ${{ steps.lint_pr_title.outputs.error_message == null }}
        with:
          header: "pr-title-lint-error"
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          delete: true
